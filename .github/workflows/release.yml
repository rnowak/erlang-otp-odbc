name: Build Windows Binary

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Verify version consistency
        run: |
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          echo "Tag version: ${TAG_VERSION}"

          APP_SRC_VERSION=$(grep '{vsn,' src/odbc.app.src | awk -F'"' '{print $2}')
          echo "app.src version: ${APP_SRC_VERSION}"
          if [ "$TAG_VERSION" != "$APP_SRC_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match src/odbc.app.src vsn (${APP_SRC_VERSION})"
            exit 1
          fi

          APPUP_VERSION=$(grep -oP '^\{"[^"]+' src/odbc.appup.src | tr -d '{"')
          echo "appup.src version: ${APPUP_VERSION}"
          if [ "$TAG_VERSION" != "$APPUP_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match src/odbc.appup.src vsn (${APPUP_VERSION})"
            exit 1
          fi

          echo "✓ All versions match: ${TAG_VERSION}"

  update-release:
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Prepare
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> $GITHUB_ENV
          echo "RELEASE_ID=${{ github.event.release.id }}" >> $GITHUB_ENV

      - name: Extract changelog and update release body
        run: |
          RELEASE_BODY=$(awk -v ver="$RELEASE_VERSION" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; next}
            flag && /^## \[/ {exit}
            flag
          ' CHANGELOG.md)

          if [ -z "$RELEASE_BODY" ]; then
            echo "::warning::No changelog entry found for version ${RELEASE_VERSION}"
            exit 0
          fi

          RELEASE_DATA=$(jq -n \
            --arg name "Erlang/OTP ODBC ${RELEASE_VERSION}" \
            --arg body "$RELEASE_BODY" \
            '{"name": $name, "body": $body}') || exit 1

          curl -L \
            --fail-with-body \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            -d "${RELEASE_DATA}"

  build-windows:
    runs-on: windows-latest
    needs: check-version
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'

      - name: Build odbcserver.exe
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvarsall.bat" x64
          set ODBC_PREBUILT_VSN=none
          call c_src\build_or_fetch_win.bat

      - name: Verify binary
        shell: cmd
        run: |
          if not exist priv\bin\odbcserver.exe (
            echo ERROR: odbcserver.exe not found
            exit /b 1
          )
          dir priv\bin\odbcserver.exe

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare upload URL
        shell: bash
        run: |
          UPLOAD_URL="${{ github.event.release.upload_url }}"
          UPLOAD_URL=${UPLOAD_URL/\{?name,label\}}
          echo "UPLOAD_URL=${UPLOAD_URL}" >> $GITHUB_ENV

      - name: Upload release asset
        shell: bash
        env:
          ASSET_NAME: odbcserver-${{ steps.version.outputs.version }}-win64.exe
        run: |
          echo "Uploading ${ASSET_NAME}..."
          curl -L \
            --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=${ASSET_NAME}" \
            --data-binary @"priv/bin/odbcserver.exe"
