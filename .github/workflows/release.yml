name: Build Windows Binary

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'

      - name: Build odbcserver.exe
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvarsall.bat" x64
          set ODBC_PREBUILT_VSN=none
          call c_src\build_or_fetch_win.bat

      - name: Verify binary
        shell: cmd
        run: |
          if not exist priv\bin\odbcserver.exe (
            echo ERROR: odbcserver.exe not found
            exit /b 1
          )
          dir priv\bin\odbcserver.exe

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare upload URL
        shell: bash
        run: |
          UPLOAD_URL="${{ github.event.release.upload_url }}"
          UPLOAD_URL=${UPLOAD_URL/\{?name,label\}}
          echo "UPLOAD_URL=${UPLOAD_URL}" >> $GITHUB_ENV

      - name: Upload release asset
        shell: bash
        env:
          ASSET_NAME: odbcserver-${{ steps.version.outputs.version }}-win64.exe
        run: |
          echo "Uploading ${ASSET_NAME}..."
          curl -L \
            --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=${ASSET_NAME}" \
            --data-binary @"priv/bin/odbcserver.exe"
